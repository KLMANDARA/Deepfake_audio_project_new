<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Audio Detection</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        button {
            padding: 10px;
            margin-top: 10px;
            background: green;
            border: none;
            color: white;
        }
        canvas {
            margin-top: 20px;
            background: black;
        }
    </style>
</head>

<body>

<h1>🎧 Deepfake Audio Detection</h1>

<input type="file" id="audio" accept="audio/*">
<br>
<button onclick="analyze()">Analyze</button>

<canvas id="canvas" width="500" height="200"></canvas>

<p id="result"></p>
<script>
function analyze() {
    let score = Math.random(); // simulate AI confidence
    let confidence = (score * 100).toFixed(2);

    let resultElement = document.getElementById("result");

    if (score > 0.6) {
        resultElement.innerText = `⚠️ Fake Audio (${confidence}% confidence)`;
        resultElement.style.color = "red";   // 🔴 FAKE = RED
    } else {
        resultElement.innerText = `✅ Real Audio (${confidence}% confidence)`;
        resultElement.style.color = "lime";  // 🟢 REAL = GREEN
    }
}
</script>


</body>
</html>
