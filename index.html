<h1>🎧 Deepfake Audio Detection</h1>

<input type="file" id="audioInput" accept="audio/*">
<br>
<button onclick="analyzeAudio()">Analyze</button>

<canvas id="waveform" width="600" height="200"></canvas>

<div id="resultBox" class="result-box"></div>

<script>
    let audioBuffer = null;

    // Load audio + draw waveform
    document.getElementById("audioInput").addEventListener("change", function () {
        const file = this.files[0];
        const reader = new FileReader();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        reader.onload = function (e) {
            audioCtx.decodeAudioData(e.target.result, function (buffer) {
                audioBuffer = buffer;
                drawWaveform(buffer);
            });
        };

        reader.readAsArrayBuffer(file);
    });

    // Draw waveform
    function drawWaveform(buffer) {
        const canvas = document.getElementById("waveform");
        const ctx = canvas.getContext("2d");

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();

        const data = buffer.getChannelData(0);
        const step = Math.ceil(data.length / canvas.width);

        for (let i = 0; i < canvas.width; i++) {
            const y = (1 + data[i * step]) * canvas.height / 2;
            ctx.lineTo(i, y);
        }

        ctx.strokeStyle = "#00ffcc";
        ctx.stroke();
    }

    // Analyze audio (dummy logic for demo)
    function analyzeAudio() {
        const box = document.getElementById("resultBox");

        if (!audioBuffer) {
            alert("Please upload an audio file first!");
            return;
        }

        // Fake detection logic (for demo)
        const confidence = (Math.random() * 50 + 50).toFixed(2);
        const isFake = Math.random() > 0.5;

        if (isFake) {
            box.className = "result-box fake";
            box.innerHTML = "❌ Fake Audio (" + confidence + "% confidence)";
        } else {
            box.className = "result-box real";
            box.innerHTML = "✅ Real Audio (" + confidence + "% confidence)";
        }
    }
</script>
